#
# One-command bench: ChirpStack (US915) + Leftenant + a standalone events store.
#
#   cp .env.example .env && docker compose up -d --build
#
# A one-shot `provisioner` runs after ChirpStack is up, creates the
# "Intelligent Farming" tenant + a tenant API key, and writes the connection
# artifacts to the `shared` volume. Leftenant boots already configured with that
# key.
#
# Device events are stored by ChirpStack's own PostgreSQL integration: ChirpStack
# writes every event (uplinks, joins, acks, status, …) straight into `events-postgres`,
# auto-creating its `event_*` tables on first boot. `events-api` (PostGraphile) serves a
# read-only GraphQL/GraphiQL endpoint over them. No separate collector; nothing here
# depends on the intelligent-farming-hub repo.
#
# Leftenant runs an image built from its public repo (github.com/intelligent-farming/leftenant,
# main) by the setup scripts via `docker build <giturl>` — no local clone, and no compose git-URL
# build context (that one breaks on Windows). Everything else uses published images or builds in-repo.
name: intelligent-farming-stack

services:
  # ── ChirpStack core ────────────────────────────────────────────────────────
  chirpstack-postgres:
    image: postgres:14-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: chirpstack
      POSTGRES_PASSWORD: chirpstack
      POSTGRES_DB: chirpstack
    volumes:
      - ./postgresql/initdb:/docker-entrypoint-initdb.d:ro
      - chirpstack-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chirpstack -d chirpstack"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 300 1 --save 60 100 --appendonly no
    volumes:
      - redisdata:/data

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "${MOSQUITTO_MQTT_PORT:-1883}:1883"   # native MQTT (gateways; in-network clients use the service name)
      - "${MOSQUITTO_WS_PORT:-9001}:9001"     # MQTT over websockets (Leftenant join monitor, browser-side)
    volumes:
      - ./mosquitto:/mosquitto/config/:ro

  chirpstack:
    image: chirpstack/chirpstack:4
    restart: unless-stopped
    command: -c /etc/chirpstack
    volumes:
      - ./chirpstack:/etc/chirpstack:ro
    environment:
      POSTGRESQL_HOST: chirpstack-postgres
      REDIS_HOST: redis
      MQTT_BROKER_HOST: mosquitto
      API_SECRET: ${CHIRPSTACK_API_SECRET:-change-me-please}
      # Active region/sub-band. Expands into enabled_regions in chirpstack.toml and
      # must match the gateway bridges' topic prefix (both use REGION). Default us915_0.
      REGION: ${REGION:-us915_0}
      # PostgreSQL integration target — ChirpStack writes every device event into
      # this standalone DB and auto-creates the event_* tables there on first boot.
      # These expand into the [integration.postgresql] dsn in chirpstack/chirpstack.toml.
      EVENTS_POSTGRESQL_HOST: events-postgres
      EVENTS_POSTGRESQL_USER: ${EVENTS_POSTGRES_USER:-events}
      EVENTS_POSTGRESQL_PASSWORD: ${EVENTS_POSTGRES_PASSWORD:-changeme}
      EVENTS_POSTGRESQL_DB: ${EVENTS_POSTGRES_DB:-chirpstack_events}
    ports:
      - "${CHIRPSTACK_HOST_PORT:-8080}:8080"   # admin UI + gRPC
    depends_on:
      chirpstack-postgres:
        condition: service_healthy
      events-postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      redis:
        condition: service_started

  chirpstack-rest-api:
    image: chirpstack/chirpstack-rest-api:4
    restart: unless-stopped
    # --cors must match the browser origin Leftenant is served from. Override
    # LEFTENANT_ORIGIN in .env when reaching the bench by LAN IP instead of localhost.
    command: --server chirpstack:8080 --bind 0.0.0.0:8090 --insecure --cors ${LEFTENANT_ORIGIN:-http://localhost:4173}
    ports:
      - "${CHIRPSTACK_REST_HOST_PORT:-8090}:8090"
    depends_on:
      - chirpstack

  # Semtech UDP packet-forwarder gateways (legacy protocol, UDP :1700).
  # The MQTT topic prefix is the REGION flag (default us915_0 — see .env), and must
  # match ChirpStack's enabled region. Flip REGION to us915_1 (or any band whose
  # region file is present) to change sub-band.
  chirpstack-gateway-bridge:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    ports:
      - "${GATEWAY_BRIDGE_UDP_PORT:-1700}:1700/udp"   # Semtech UDP packet forwarder
    volumes:
      - ./gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    environment:
      INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE: ${REGION:-us915_0}/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE: ${REGION:-us915_0}/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE: ${REGION:-us915_0}/gateway/{{ .GatewayID }}/command/#
    depends_on:
      - mosquitto

  # BasicStation gateways (LNS WebSocket, TCP :3001). Same REGION topic prefix as the
  # UDP bridge, so ChirpStack handles both. Point the gateway's LNS/tc URI at
  # ws://<this-host-ip>:3001. The REGION flag also selects the channel-plan file
  # (chirpstack-gateway-bridge-basicstation-${REGION}.toml) — us915_0 and us915_1
  # ship with the stack; add gateway-bridge/…-<band>.toml for other bands.
  chirpstack-gateway-bridge-basicstation:
    image: chirpstack/chirpstack-gateway-bridge:4
    restart: unless-stopped
    command: -c /etc/chirpstack-gateway-bridge/chirpstack-gateway-bridge-basicstation-${REGION:-us915_0}.toml
    ports:
      - "${GATEWAY_BRIDGE_BASICSTATION_PORT:-3001}:3001"   # BasicStation LNS WebSocket
    volumes:
      - ./gateway-bridge:/etc/chirpstack-gateway-bridge:ro
    environment:
      INTEGRATION__MQTT__EVENT_TOPIC_TEMPLATE: ${REGION:-us915_0}/gateway/{{ .GatewayID }}/event/{{ .EventType }}
      INTEGRATION__MQTT__STATE_TOPIC_TEMPLATE: ${REGION:-us915_0}/gateway/{{ .GatewayID }}/state/{{ .StateType }}
      INTEGRATION__MQTT__COMMAND_TOPIC_TEMPLATE: ${REGION:-us915_0}/gateway/{{ .GatewayID }}/command/#
    depends_on:
      - mosquitto

  # ── Provisioner (one-shot) ──────────────────────────────────────────────────
  provisioner:
    build: ./provisioning
    restart: "no"
    environment:
      # Provisioning (login, tenant, api-key) goes over gRPC — the REST gateway
      # does not expose InternalService/ApiKeyService.
      CHIRPSTACK_GRPC: chirpstack:8080
      # REST endpoint passed to attach-codecs.py (codec attach uses REST).
      CHIRPSTACK_REST_URL: http://chirpstack-rest-api:8090
      CHIRPSTACK_ADMIN_EMAIL: ${CHIRPSTACK_ADMIN_EMAIL:-admin}
      CHIRPSTACK_ADMIN_PASSWORD: ${CHIRPSTACK_ADMIN_PASSWORD:-admin}
      TENANT_NAME: ${TENANT_NAME:-Intelligent Farming}
      API_KEY_NAME: ${API_KEY_NAME:-intelligent-farming-stack}
      # Browser-facing URLs written into Leftenant's config.json. Change these
      # (and LEFTENANT_ORIGIN above) when the bench is reached by LAN IP.
      LEFTENANT_CHIRPSTACK_URL: ${LEFTENANT_CHIRPSTACK_URL:-http://localhost:8090}
      LEFTENANT_MQTT_URL: ${LEFTENANT_MQTT_URL:-ws://localhost:9001}
    volumes:
      - shared:/shared
      # Best-effort codec attach: if codec .js files are present at CODECS_DIR,
      # attach-codecs.py runs against the new tenant key. Optional and orthogonal
      # to the event store — a missing/empty dir just makes this a no-op. Defaults
      # to the git-ignored Makerfabs codecs if that repo happens to be cloned
      # alongside; point CODECS_DIR at any local folder to decouple entirely.
      - ${CODECS_DIR:-./codecs}:/codecs:ro
    depends_on:
      - chirpstack            # gRPC provisioning target
      - chirpstack-rest-api   # used by the best-effort codec attach

  # ── Leftenant (pre-configured provisioning UI) ──────────────────────────────
  leftenant:
    # Runs an image built from the public repo's latest main. We intentionally do
    # NOT use compose's `build:` git-URL support: compose mis-resolves a remote git
    # context as a local path on Windows (docker/compose#13815 — "filename, directory
    # name, or volume label syntax is incorrect"). Instead the setup scripts and the
    # one-line installer build this tag with `docker build <giturl>` (the buildx CLI
    # clones the repo server-side, which works on every platform). Build it with:
    #   docker build -t intelligent-farming-stack/leftenant:local https://github.com/intelligent-farming/leftenant.git#main
    image: ${LEFTENANT_IMAGE:-intelligent-farming-stack/leftenant:local}
    restart: unless-stopped
    ports:
      - "${LEFTENANT_HOST_PORT:-4173}:80"
    volumes:
      - shared:/shared:ro   # entrypoint reads /shared/config.json written by the provisioner
    depends_on:
      provisioner:
        condition: service_completed_successfully

  # ── Standalone device-event store (ChirpStack PostgreSQL integration target) ──
  events-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # wal_level is `replica` by default. Set EVENTS_POSTGRES_WAL_LEVEL=logical (see
    # .env) to enable log-based CDC for Fivetran, then recreate this container:
    # `docker compose up -d events-postgres`. The slot/sender counts below are the
    # PG16 defaults, surfaced so one Fivetran slot fits without extra tuning.
    command:
      - "postgres"
      - "-c"
      - "wal_level=${EVENTS_POSTGRES_WAL_LEVEL:-replica}"
      - "-c"
      - "max_wal_senders=${EVENTS_POSTGRES_MAX_WAL_SENDERS:-10}"
      - "-c"
      - "max_replication_slots=${EVENTS_POSTGRES_MAX_REPLICATION_SLOTS:-10}"
    environment:
      # ChirpStack connects as this owner role and auto-creates the event_* tables.
      POSTGRES_USER: ${EVENTS_POSTGRES_USER:-events}
      POSTGRES_PASSWORD: ${EVENTS_POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${EVENTS_POSTGRES_DB:-chirpstack_events}
      # Read-only role PostGraphile connects as (created by initdb 010_events_roles.sh).
      POSTGRES_API_USER: ${EVENTS_POSTGRES_API_USER:-events_api}
      POSTGRES_API_PASSWORD: ${EVENTS_POSTGRES_API_PASSWORD:-changeme-api}
      # Opt-in read-only replication role for Fivetran; the same init script creates
      # it (+ publication) only when both are set (blank = disabled).
      POSTGRES_FIVETRAN_USER: ${EVENTS_POSTGRES_FIVETRAN_USER:-}
      POSTGRES_FIVETRAN_PASSWORD: ${EVENTS_POSTGRES_FIVETRAN_PASSWORD:-}
      POSTGRES_FIVETRAN_PUBLICATION: ${EVENTS_POSTGRES_FIVETRAN_PUBLICATION:-fivetran_pub}
    volumes:
      - eventsdata:/var/lib/postgresql/data
      - ./postgresql/events-initdb:/docker-entrypoint-initdb.d:ro
    ports:
      # Loopback-only by default. Flip EVENTS_POSTGRES_HOST_BIND to 0.0.0.0 (or a
      # specific LAN/VPN address) to let an off-device consumer like Fivetran
      # reach Postgres. Expose beyond the device only over TLS + a firewall
      # scoped to the consumer's source IPs, using the read-only events_api role.
      - "${EVENTS_POSTGRES_HOST_BIND:-127.0.0.1}:${EVENTS_POSTGRES_HOST_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 12

  # One-shot: block until ChirpStack has created its event_up table, so events-api
  # introspects a populated schema on first boot (matches the provisioner idiom).
  events-schema-wait:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGHOST: events-postgres
      PGUSER: ${EVENTS_POSTGRES_USER:-events}
      PGPASSWORD: ${EVENTS_POSTGRES_PASSWORD:-changeme}
      PGDATABASE: ${EVENTS_POSTGRES_DB:-chirpstack_events}
    entrypoint:
      - "bash"
      - "-c"
      - |
        echo "waiting for ChirpStack to create public.event_up ..."
        until [ "$$(psql -tAc "SELECT to_regclass('public.event_up') IS NOT NULL")" = "t" ]; do
          sleep 2
        done
        echo "event_up exists — schema ready"
    depends_on:
      events-postgres:
        condition: service_healthy
      chirpstack:
        condition: service_started

  # ── Read-only GraphQL/GraphiQL over the event store ───────────────────────────
  events-api:
    build: ./events-api
    restart: unless-stopped
    environment:
      # Connects as the read-only events_api role; creds via env (not CLI args) so
      # they don't show up in the container's process list.
      DATABASE_URL: postgres://${EVENTS_POSTGRES_API_USER:-events_api}:${EVENTS_POSTGRES_API_PASSWORD:-changeme-api}@events-postgres:5432/${EVENTS_POSTGRES_DB:-chirpstack_events}
      API_GRAPHIQL: ${EVENTS_API_GRAPHIQL:-true}
    ports:
      # host 5050 by default: port 5000 is taken by the macOS AirPlay Receiver.
      - "${EVENTS_API_HOST_BIND:-127.0.0.1}:${EVENTS_API_HOST_PORT:-5050}:5000"
    depends_on:
      events-postgres:
        condition: service_healthy
      events-schema-wait:
        condition: service_completed_successfully

volumes:
  chirpstack-pgdata:
  redisdata:
  eventsdata:
  shared:
